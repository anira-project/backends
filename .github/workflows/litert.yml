name: litert

# Thin per-backend wrapper: derive version + release flag, then hand the matrix
# to the shared _build-backend.yml pipeline.
#
# Triggers (release model: ../../docs/RELEASE.md):
#   - push/PR touching engines/litert/ or shared CI -> validate only (no release)
#   - tag v<anira-version> (e.g. v2.0.3) -> build LiteRT at its VERSION, publish to that release

on:
  push:
    branches: [main]
    paths:
      - 'engines/litert/**'
      - 'shared/**'
      - '.github/workflows/litert.yml'
      - '.github/workflows/_build-backend.yml'
    tags:
      - 'v[0-9]*'
  pull_request:
    paths:
      - 'engines/litert/**'
      - 'shared/**'
      - '.github/workflows/litert.yml'
      - '.github/workflows/_build-backend.yml'

concurrency:
  group: litert-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release: ${{ steps.meta.outputs.release }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      matrix: ${{ steps.meta.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: derive version, release flag, matrix
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          # Engine version (pins what's built, appears in archive names).
          echo "version=$(tr -d '[:space:]' < engines/litert/VERSION)" >> "$GITHUB_OUTPUT"
          # Release is keyed to the anira version: a v<x.y.z> tag publishes to that release.
          if [[ "$GITHUB_REF" == refs/tags/v[0-9]* ]]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi
          echo "matrix=$(jq -c . engines/litert/ci-matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    name: LiteRT
    needs: setup
    uses: ./.github/workflows/_build-backend.yml
    with:
      backend: litert
      backend_dir: engines/litert
      libname: tensorflowlite_c
      version: ${{ needs.setup.outputs.version }}
      release: ${{ needs.setup.outputs.release == 'true' }}
      release_tag: ${{ needs.setup.outputs.release_tag }}
      matrix: ${{ needs.setup.outputs.matrix }}
    secrets: inherit
