name: libtorch

# CPU SHARED libtorch, keyed to engines/libtorch/VERSION. Per target we either
# REPACKAGE an upstream download.pytorch.org prebuilt (macOS arm64, Linux x86_64,
# Windows x86_64) or BUILD from source where PyTorch ships no 2.12.0 CPU prebuilt
# (macOS x86_64, Linux aarch64, Windows arm64). Every target is smoke-gated via
# find_package(Torch) — the same path anira consumes. Mirrors onnxruntime.yml.
#
# Triggers (release model: ../../docs/RELEASE.md):
#   - push/PR touching engines/libtorch/ or shared CI -> validate only (no release)
#   - tag v<anira-version> (e.g. v2.0.3) -> build at VERSION, publish to that release

on:
  push:
    branches: [main]
    paths:
      - 'engines/libtorch/**'
      - 'shared/**'
      - '.github/workflows/libtorch.yml'
    tags:
      - 'v[0-9]*'
  pull_request:
    paths:
      - 'engines/libtorch/**'
      - 'shared/**'
      - '.github/workflows/libtorch.yml'

concurrency:
  group: libtorch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release: ${{ steps.meta.outputs.release }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      matrix: ${{ steps.meta.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: meta
        shell: bash
        run: |
          set -euo pipefail
          echo "version=$(tr -d '[:space:]' < engines/libtorch/VERSION)" >> "$GITHUB_OUTPUT"
          if [[ "$GITHUB_REF" == refs/tags/v[0-9]* ]]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi
          echo "matrix=$(jq -c . engines/libtorch/ci-matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    name: ${{ matrix.label }}-${{ matrix.source }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: setup build tools
        uses: tanh-lab/ci-actions/setup-cpp-build-tools@bbdd199c8796cdec6f064827eedc45028cd60ce3
      - name: ensure ninja (Linux fallback)
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: command -v ninja >/dev/null || { sudo apt-get update && sudo apt-get install -y ninja-build; }

      # Load MSVC env so cl.exe/lib.exe + (for arm64) the build toolchain are on PATH.
      - name: setup MSVC env (Windows)
        if: ${{ runner.os == 'Windows' }}
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      # Windows arm64 builds with clang-cl (matching PyTorch's official win-arm64),
      # not MSVC cl — see build-libtorch.sh. clang-cl uses the MSVC env above for
      # headers/libs/linker. Install LLVM if the runner image lacks it.
      - name: ensure clang-cl (Windows from source)
        if: ${{ matrix.source == 'build' && runner.os == 'Windows' }}
        shell: bash
        run: |
          if command -v clang-cl >/dev/null; then
            clang-cl --version
          else
            choco install llvm -y --no-progress
            echo "C:/Program Files/LLVM/bin" >> "$GITHUB_PATH"
          fi

      # ---- from-source prerequisites (only for matrix.source == build) ----------
      - uses: actions/setup-python@v5
        if: ${{ matrix.source == 'build' }}
        with:
          python-version: '3.12'
      - name: linux build deps (OpenBLAS for aarch64)
        if: ${{ matrix.source == 'build' && runner.os == 'Linux' }}
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev build-essential
      - name: sccache
        if: ${{ matrix.source == 'build' }}
        uses: mozilla-actions/sccache-action@v0.0.8
      - name: cache pytorch source
        if: ${{ matrix.source == 'build' }}
        uses: actions/cache@v4
        with:
          path: engines/libtorch/pytorch-src
          key: pytorch-src-${{ needs.setup.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}

      # ---- compose the archive name --------------------------------------------
      # slice_only rows are intermediate inputs to the macOS universal lipo job, not
      # published archives — name them distinctly so they don't collide with the
      # per-arch arm64 archive (which is the official prebuilt).
      - name: compose archive name
        id: name
        shell: bash
        run: |
          name="libtorch-${{ needs.setup.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}"
          [ "${{ matrix.slice_only }}" = "1" ] && name="${name}-universal-slice"
          echo "archive=$name" >> "$GITHUB_OUTPUT"

      # ---- stage: repackage upstream prebuilt, OR build from source ------------
      - name: repackage upstream prebuilt
        if: ${{ matrix.source == 'prebuilt' }}
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ needs.setup.outputs.version }}"
          url="https://download.pytorch.org/libtorch/cpu/${{ matrix.asset }}-${ver}${{ matrix.cpu_suffix }}.zip"
          echo "downloading $url"
          bash engines/libtorch/repackage.sh "$url" "staging/${{ steps.name.outputs.archive }}"

      - name: build from source
        if: ${{ matrix.source == 'build' }}
        shell: bash
        run: |
          set -euo pipefail
          plat="$(echo '${{ matrix.os }}' | tr '[:upper:]' '[:lower:]')"   # macOS->macos, Linux->linux, Windows->windows
          bash engines/libtorch/build-libtorch.sh "$plat" "${{ matrix.arch }}" "staging/${{ steps.name.outputs.archive }}"

      # ---- smoke (find_package(Torch) build; run on native targets) ------------
      - name: smoke test
        shell: bash
        run: |
          bash engines/libtorch/smoke-torch.sh \
            "staging/${{ steps.name.outputs.archive }}" \
            engines/libtorch/test \
            "${{ matrix.can_run }}"

      # ---- package (preserve include/ lib/ share/ [bin/]) ----------------------
      - name: package
        shell: bash
        run: |
          set -euo pipefail
          st="staging/${{ steps.name.outputs.archive }}"
          dirs="include lib"
          [ -d "$st/share" ] && dirs="$dirs share"
          [ -d "$st/bin" ]   && dirs="$dirs bin"
          PACKAGE_DIRS="$dirs" bash shared/package.sh "$st" "${{ steps.name.outputs.archive }}" dist

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.name.outputs.archive }}
          path: dist/${{ steps.name.outputs.archive }}.zip
          retention-days: 14

      - name: publish to release
        if: ${{ needs.setup.outputs.release == 'true' && matrix.slice_only != '1' }}
        shell: bash
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          tag="${{ needs.setup.outputs.release_tag }}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --notes "anira backends $tag"
          gh release upload "$tag" "dist/${{ steps.name.outputs.archive }}.zip" --clobber

  # --------------------------------------------------------------------------
  # macOS universal: lipo the from-source x86_64 + arm64 slices into one fat tree.
  # BOTH slices are from-source (build-libtorch.sh, identical config) so their dylib
  # sets/install-names match — the prerequisite for a clean lipo (mixing the official
  # prebuilt arm64 with our from-source x86_64 would risk mismatched dylib sets).
  # The per-arch arm64 archive stays the official prebuilt; this consumes a separate
  # from-source arm64 "universal slice".
  # --------------------------------------------------------------------------
  macos-universal:
    needs: [setup, build]
    name: macOS-universal-shared
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: names
        id: n
        shell: bash
        run: |
          base="libtorch-${{ needs.setup.outputs.version }}"
          {
            echo "x64=${base}-macOS-x86_64"
            echo "arm=${base}-macOS-arm64-universal-slice"
            echo "uni=${base}-macOS-universal"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v8
        with: { name: "${{ steps.n.outputs.x64 }}", path: dl/x64 }
      - uses: actions/download-artifact@v8
        with: { name: "${{ steps.n.outputs.arm }}", path: dl/arm }

      - name: lipo + assemble universal tree
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ex/x64 ex/arm
          unzip -q "dl/x64/${{ steps.n.outputs.x64 }}.zip" -d ex/x64
          unzip -q "dl/arm/${{ steps.n.outputs.arm }}.zip" -d ex/arm
          stage="staging/${{ steps.n.outputs.uni }}"
          mkdir -p "$stage/lib"
          # include/ + the Torch CMake package are arch-independent — take one copy.
          cp -R ex/arm/include "$stage/include"
          cp -R ex/arm/share   "$stage/share"
          [ -d ex/arm/bin ] && cp -R ex/arm/bin "$stage/bin"
          # lipo every Mach-O dylib present in BOTH slices; copy-through anything else
          # (symlinks, non-fat-able files). Both slices share a build config, so the
          # filenames line up one-to-one.
          for f in ex/arm/lib/*; do
            base="$(basename "$f")"
            if [ -f "ex/x64/lib/$base" ] && file -b "$f" | grep -q 'Mach-O'; then
              lipo -create "ex/arm/lib/$base" "ex/x64/lib/$base" -output "$stage/lib/$base" \
                || cp -R "$f" "$stage/lib/$base"
            else
              cp -R "$f" "$stage/lib/$base"
            fi
          done
          echo "universal libtorch_cpu slices:"; lipo -info "$stage/lib/libtorch_cpu.dylib" || true

      - name: smoke (find_package(Torch), arm64 slice)
        shell: bash
        run: bash engines/libtorch/smoke-torch.sh "staging/${{ steps.n.outputs.uni }}" engines/libtorch/test 1

      - name: package
        shell: bash
        run: |
          set -euo pipefail
          st="staging/${{ steps.n.outputs.uni }}"
          dirs="include lib"
          [ -d "$st/share" ] && dirs="$dirs share"
          [ -d "$st/bin" ]   && dirs="$dirs bin"
          PACKAGE_DIRS="$dirs" bash shared/package.sh "$st" "${{ steps.n.outputs.uni }}" dist

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.n.outputs.uni }}
          path: dist/${{ steps.n.outputs.uni }}.zip
          retention-days: 14

      - name: publish to release
        if: ${{ needs.setup.outputs.release == 'true' }}
        shell: bash
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          tag="${{ needs.setup.outputs.release_tag }}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --notes "anira backends $tag"
          gh release upload "$tag" "dist/${{ steps.n.outputs.uni }}.zip" --clobber
