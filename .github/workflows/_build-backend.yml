name: _build-backend

# Engine-agnostic build pipeline shared by every backend. A per-backend wrapper
# (tflite.yml / onnxruntime.yml / libtorch.yml) derives version + release flag + the
# matrix (engine-meta, straight from CMakePresets vendor.anira) and calls this.
#
# Every build leg goes through the root CMake orchestrator (stage-build action):
#   cmake --preset -> cmake --build -> cmake --install  into staging/<archive>.
# Then: package (zip) -> upload -> smoke gate -> publish. Aggregation jobs (macOS
# universal, Android multi-ABI bundle, iOS xcframework) follow.
#
# Setup is one composite verb (setup-toolchain); build tooling reuses tanh-lab/ci-actions,
# pinned to a SHA so an upstream change can't silently break a release build.

on:
  workflow_call:
    inputs:
      engine:      { description: "Backend id: tflite | onnxruntime | libtorch", required: true, type: string }
      libname:     { description: "Archive/lib prefix: tensorflowlite_c | onnxruntime | libtorch", required: true, type: string }
      version:     { description: "Upstream version (engine VERSION)", required: true, type: string }
      release:     { description: "Publish artifacts to a GitHub release", required: false, type: boolean, default: false }
      release_tag: { description: "Release tag (the anira version, e.g. v2.0.3)", required: false, type: string, default: "" }
      matrix:      { description: "JSON build matrix from engine-meta", required: true, type: string }
      package_dirs:          { description: "Dirs to package (libtorch needs share/bin)", required: false, type: string, default: "include lib" }
      macos_universal_kinds: { description: "JSON array of kinds to lipo into a macOS universal archive", required: false, type: string, default: "[]" }
      android_bundle_kinds:  { description: "JSON array of kinds to combine into a multi-ABI Android archive", required: false, type: string, default: "[]" }
      has_ios:     { description: "Run the iOS xcframework job (engines/<engine>/ios.sh)", required: false, type: boolean, default: false }
    secrets:
      # macOS Developer ID signing (org secrets; passed via the callers' `secrets: inherit`).
      DEV_ID_APP_CERT: { required: false }   # Developer ID Application .p12, base64
      DEV_ID_APP_PWD:  { required: false }   # .p12 password
      DEV_ID_APP:      { required: false }   # signing identity ("Developer ID Application: … (TEAMID)")

jobs:
  build:
    name: ${{ matrix.preset }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      # tanh-lab/ci-actions @ bbdd199 (main as of 2026-06-08) — bump deliberately.
      - name: setup build tools
        uses: tanh-lab/ci-actions/setup-cpp-build-tools@bbdd199c8796cdec6f064827eedc45028cd60ce3
      - name: setup toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          toolchain:    ${{ matrix.toolchain }}
          msvc_arch:    ${{ matrix.msvcArch }}
          engine:       ${{ inputs.engine }}
          source:       ${{ matrix.source }}
          version:      ${{ inputs.version }}
          cache_suffix: ${{ matrix.name }}

      # Build / repackage + install + (tflite static) bundle -> staging/<archive>.
      - name: stage build
        id: b
        uses: ./.github/actions/stage-build
        with:
          preset:  ${{ matrix.preset }}
          name:    ${{ matrix.name }}
          kind:    ${{ matrix.kind }}
          config:  ${{ matrix.config }}
          engine:  ${{ inputs.engine }}
          libname: ${{ inputs.libname }}
          version: ${{ inputs.version }}
          source:  ${{ matrix.source }}
          asset:      ${{ matrix.asset }}
          ext:        ${{ matrix.ext }}
          cpu_suffix: ${{ matrix.cpuSuffix }}
          flavor:     ${{ matrix.flavor }}

      # Developer ID sign the macOS shared dylibs before packaging (no-op without the org cert).
      - name: sign macOS dylibs
        if: ${{ runner.os == 'macOS' && matrix.kind == 'shared' }}
        uses: ./.github/actions/sign-macos
        with:
          dir: ${{ steps.b.outputs.staging }}/lib
          cert_base64: ${{ secrets.DEV_ID_APP_CERT }}
          cert_password: ${{ secrets.DEV_ID_APP_PWD }}
          identity: ${{ secrets.DEV_ID_APP }}

      - name: package
        uses: ./.github/actions/package
        with:
          staging: ${{ steps.b.outputs.staging }}
          name: ${{ steps.b.outputs.archive }}
          dirs: ${{ inputs.package_dirs }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.b.outputs.archive }}
          path: dist/${{ steps.b.outputs.archive }}.zip
          retention-days: 14

      # Desktop smoke gate (native run) against the staged archive. canRun==1 marks the
      # runnable desktop legs; the multi-ABI Android AAR leg (toolchain none, canRun 0)
      # is not host-smokeable and is skipped here.
      - name: smoke (desktop)
        if: ${{ matrix.toolchain == 'none' && matrix.canRun == '1' }}
        uses: ./.github/actions/smoke
        with:
          engine:  ${{ inputs.engine }}
          staging: ${{ steps.b.outputs.staging }}
          preset:  ${{ matrix.preset }}
          kind:    ${{ matrix.kind }}
          config:  ${{ matrix.config }}
          arch:    ${{ matrix.arch }}

      # Android: NDK-cross-compile the smoke, run on a KVM-accelerated x86_64 emulator
      # (arm64-v8a software emulation hangs -> compile+link only). tflite only — the model
      # + lib are TFLite-specific; onnx Android stays build-only as before.
      - name: smoke (android, build binary)
        if: ${{ matrix.toolchain == 'android' && inputs.engine == 'tflite' }}
        shell: bash
        run: |
          set -euo pipefail
          host="linux-x86_64"; [ "$(uname -m)" = "aarch64" ] && host="linux-aarch64"
          tc="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/$host/bin"
          case "${{ matrix.arch }}" in
            x86_64)    cxx="$tc/x86_64-linux-android24-clang++" ;;
            arm64-v8a) cxx="$tc/aarch64-linux-android24-clang++" ;;
            *) echo "::error::unknown android abi ${{ matrix.arch }}"; exit 1 ;;
          esac
          st="${{ steps.b.outputs.staging }}"
          if [ "${{ matrix.kind }}" = "static" ]; then lib="$st/lib/lib${{ inputs.libname }}.a"; else lib="$st/lib/lib${{ inputs.libname }}.so"; fi
          "$cxx" -std=c++17 -static-libstdc++ -I "$st/include" engines/${{ inputs.engine }}/test/smoke.cpp "$lib" -llog -lm -o smoke_android
          file smoke_android
          curl -fsSL "https://raw.githubusercontent.com/tensorflow/tensorflow/v${{ inputs.version }}/tensorflow/lite/testdata/add.bin" -o add.bin
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm
      - name: smoke (android, run on emulator)
        if: ${{ matrix.toolchain == 'android' && inputs.engine == 'tflite' && matrix.arch == 'x86_64' && matrix.kind == 'static' }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: ${{ matrix.arch }}
          force-avd-creation: true
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -no-snapshot
          script: |
            adb push smoke_android /data/local/tmp/smoke
            adb push add.bin /data/local/tmp/add.bin
            adb shell chmod 755 /data/local/tmp/smoke
            adb shell "/data/local/tmp/smoke /data/local/tmp/add.bin" 2>&1 | tee out.txt
            grep -q PASS out.txt

      # WASM: link the smoke against the staged .a with em++ (proves the archive is
      # symbol-complete) and run a real forward pass under emsdk's Node. NODERAWFS lets the
      # smoke std::ifstream the model off the real FS; PROXY_TO_PTHREAD runs main() off a
      # worker so the threads-enabled lib's threadpool works without blocking node's loop.
      # Uses the same emsdk build.py installed+activated under the ort source (4.0.23).
      - name: smoke (wasm, node)
        if: ${{ matrix.toolchain == 'emscripten' }}
        shell: bash
        run: |
          set -euo pipefail
          . engines/${{ inputs.engine }}/onnxruntime-src/cmake/external/emsdk/emsdk_env.sh
          st="${{ steps.b.outputs.staging }}"
          em++ -std=c++17 -O2 -I "$st/include" \
            engines/${{ inputs.engine }}/test/smoke.cpp "$st/lib/lib${{ inputs.libname }}.a" \
            -pthread -sPROXY_TO_PTHREAD=1 -sEXIT_RUNTIME=1 \
            -sALLOW_MEMORY_GROWTH=1 -sNODERAWFS=1 -o smoke.js
          node smoke.js engines/${{ inputs.engine }}/test/add.onnx 2>&1 | tee out.txt
          grep -q PASS out.txt

      # Publish standalone, except intermediate per-ABI Android legs (toolchain==android),
      # which are combined into one multi-ABI archive below. The multi-ABI AAR leg
      # (toolchain==none, arch==multi) publishes here directly.
      - name: publish
        if: ${{ inputs.release && matrix.toolchain != 'android' }}
        uses: ./.github/actions/publish-release
        with:
          tag: ${{ inputs.release_tag }}
          file: dist/${{ steps.b.outputs.archive }}.zip
          token: ${{ github.token }}

  # --------------------------------------------------------------------------
  # macOS universal: lipo the x86_64 + arm64 per-arch archives into one fat tree.
  # --------------------------------------------------------------------------
  macos-universal:
    needs: build
    if: ${{ !cancelled() && needs.build.result == 'success' && inputs.macos_universal_kinds != '[]' }}
    name: macOS-universal-${{ matrix.kind }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        kind: ${{ fromJSON(inputs.macos_universal_kinds) }}
    steps:
      - uses: actions/checkout@v6
      - name: names
        id: n
        shell: bash
        run: |
          base="${{ inputs.libname }}-${{ inputs.version }}"
          {
            echo "x64=${base}-macOS-x86_64-${{ matrix.kind }}"
            echo "arm=${base}-macOS-arm64-${{ matrix.kind }}"
            echo "uni=${base}-macOS-universal-${{ matrix.kind }}"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v8
        with: { name: "${{ steps.n.outputs.x64 }}", path: dl/x64 }
      - uses: actions/download-artifact@v8
        with: { name: "${{ steps.n.outputs.arm }}", path: dl/arm }

      - name: lipo + assemble universal tree
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ex/x64 ex/arm
          unzip -q "dl/x64/${{ steps.n.outputs.x64 }}.zip" -d ex/x64
          unzip -q "dl/arm/${{ steps.n.outputs.arm }}.zip" -d ex/arm
          stage="staging/${{ steps.n.outputs.uni }}"; mkdir -p "$stage/lib"
          cp -R ex/arm/include "$stage/include"
          if [ "${{ inputs.engine }}" = "libtorch" ]; then
            # full package tree: arch-independent parts once, lipo every Mach-O dylib present
            # in both slices, copy-through everything else (symlinks, non-fat files).
            cp -R ex/arm/share "$stage/share"
            [ -d ex/arm/bin ] && cp -R ex/arm/bin "$stage/bin"
            for f in ex/arm/lib/*; do
              b="$(basename "$f")"
              if [ -f "ex/x64/lib/$b" ] && file -b "$f" | grep -q 'Mach-O'; then
                lipo -create "ex/arm/lib/$b" "ex/x64/lib/$b" -output "$stage/lib/$b" || cp -R "$f" "$stage/lib/$b"
              else
                cp -R "$f" "$stage/lib/$b"
              fi
            done
          else
            # single lib (tflite / onnx)
            if [ "${{ matrix.kind }}" = "static" ]; then libf="lib${{ inputs.libname }}.a"; else libf="lib${{ inputs.libname }}.dylib"; fi
            lipo -create "ex/x64/lib/$libf" "ex/arm/lib/$libf" -output "$stage/lib/$libf"
            lipo -info "$stage/lib/$libf"
          fi

      # Re-sign after lipo (combining the per-arch dylibs invalidates their signatures).
      - name: sign universal dylib
        if: ${{ matrix.kind == 'shared' }}
        uses: ./.github/actions/sign-macos
        with:
          dir: staging/${{ steps.n.outputs.uni }}/lib
          cert_base64: ${{ secrets.DEV_ID_APP_CERT }}
          cert_password: ${{ secrets.DEV_ID_APP_PWD }}
          identity: ${{ secrets.DEV_ID_APP }}

      - name: package
        uses: ./.github/actions/package
        with:
          staging: staging/${{ steps.n.outputs.uni }}
          name: ${{ steps.n.outputs.uni }}
          dirs: ${{ inputs.package_dirs }}

      - name: smoke (universal, arm64 slice)
        uses: ./.github/actions/smoke
        with:
          engine:  ${{ inputs.engine }}
          staging: staging/${{ steps.n.outputs.uni }}
          preset:  uni-${{ matrix.kind }}
          kind:    ${{ matrix.kind }}
          config:  Release
          arch:    arm64

      - uses: actions/upload-artifact@v7
        with: { name: "${{ steps.n.outputs.uni }}", path: "dist/${{ steps.n.outputs.uni }}.zip", retention-days: 14 }
      - name: publish
        if: ${{ inputs.release }}
        uses: ./.github/actions/publish-release
        with: { tag: "${{ inputs.release_tag }}", file: "dist/${{ steps.n.outputs.uni }}.zip", token: "${{ github.token }}" }

  # --------------------------------------------------------------------------
  # Android: combine per-ABI archives into one multi-ABI archive (lib/<abi>/…).
  # --------------------------------------------------------------------------
  android-bundle:
    needs: build
    if: ${{ !cancelled() && needs.build.result == 'success' && inputs.android_bundle_kinds != '[]' }}
    name: Android-${{ matrix.kind }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        kind: ${{ fromJSON(inputs.android_bundle_kinds) }}
    steps:
      - uses: actions/checkout@v6
      - name: names
        id: n
        shell: bash
        run: |
          base="${{ inputs.libname }}-${{ inputs.version }}"
          if [ "${{ matrix.kind }}" = "static" ]; then libf="lib${{ inputs.libname }}.a"; else libf="lib${{ inputs.libname }}.so"; fi
          {
            echo "arm=${base}-Android-arm64-v8a-${{ matrix.kind }}"
            echo "x64=${base}-Android-x86_64-${{ matrix.kind }}"
            echo "bundle=${base}-Android-${{ matrix.kind }}"
            echo "libf=$libf"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v8
        with: { name: "${{ steps.n.outputs.arm }}", path: dl/arm }
      - uses: actions/download-artifact@v8
        with: { name: "${{ steps.n.outputs.x64 }}", path: dl/x64 }
      - name: assemble multi-ABI bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ex/arm ex/x64
          unzip -q "dl/arm/${{ steps.n.outputs.arm }}.zip" -d ex/arm
          unzip -q "dl/x64/${{ steps.n.outputs.x64 }}.zip" -d ex/x64
          stage="staging/${{ steps.n.outputs.bundle }}"
          mkdir -p "$stage/lib/arm64-v8a" "$stage/lib/x86_64"
          cp -R ex/arm/include "$stage/include"
          cp "ex/arm/lib/${{ steps.n.outputs.libf }}" "$stage/lib/arm64-v8a/"
          cp "ex/x64/lib/${{ steps.n.outputs.libf }}" "$stage/lib/x86_64/"
      - name: package
        uses: ./.github/actions/package
        with:
          staging: staging/${{ steps.n.outputs.bundle }}
          name: ${{ steps.n.outputs.bundle }}
      - uses: actions/upload-artifact@v7
        with: { name: "${{ steps.n.outputs.bundle }}", path: "dist/${{ steps.n.outputs.bundle }}.zip", retention-days: 14 }
      - name: publish
        if: ${{ inputs.release }}
        uses: ./.github/actions/publish-release
        with: { tag: "${{ inputs.release_tag }}", file: "dist/${{ steps.n.outputs.bundle }}.zip", token: "${{ github.token }}" }

  # --------------------------------------------------------------------------
  # iOS xcframework: engines/<engine>/ios.sh repackages (tflite) or builds (onnx) it,
  # smoke-gates on the simulator, and produces dist/<archive>.zip.
  # --------------------------------------------------------------------------
  ios:
    needs: build
    if: ${{ !cancelled() && needs.build.result == 'success' && inputs.has_ios }}
    name: iOS-xcframework
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: setup toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          engine:  ${{ inputs.engine }}
          source:  build
          version: ${{ inputs.version }}
      - name: build/repackage xcframework
        id: x
        shell: bash
        run: |
          set -euo pipefail
          archive="${{ inputs.libname }}-${{ inputs.version }}-iOS-xcframework"
          bash engines/${{ inputs.engine }}/ios.sh "$archive"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with: { name: "${{ steps.x.outputs.archive }}", path: "dist/${{ steps.x.outputs.archive }}.zip", retention-days: 14 }
      - name: publish
        if: ${{ inputs.release }}
        uses: ./.github/actions/publish-release
        with: { tag: "${{ inputs.release_tag }}", file: "dist/${{ steps.x.outputs.archive }}.zip", token: "${{ github.token }}" }
