name: _build-backend

# Reusable build pipeline shared by every backend. The per-backend workflow
# (e.g. litert.yml) computes the matrix + version and calls this.
#
# Build step reuses tanh-lab/ci-actions, pinned to a commit SHA (not @main) so an
# upstream change can't silently break a release build.

on:
  workflow_call:
    inputs:
      backend:
        description: "Backend id (used for tag/release/artifact names), e.g. litert"
        required: true
        type: string
      backend_dir:
        description: "Path to the backend's source dir, e.g. engines/litert"
        required: true
        type: string
      libname:
        description: "Library/archive prefix, e.g. tensorflowlite_c"
        required: true
        type: string
      version:
        description: "Upstream version from the backend's VERSION file"
        required: true
        type: string
      release:
        description: "Publish artifacts to a GitHub Release"
        required: false
        default: false
        type: boolean
      matrix:
        description: "JSON build matrix (see litert.yml setup job)"
        required: true
        type: string
    secrets:
      APPLE_SIGN_IDENTITY:
        required: false
      APPLE_CERT_P12_BASE64:
        required: false
      APPLE_CERT_PASSWORD:
        required: false

# Pinned ci-actions ref — bump deliberately.
# tanh-lab/ci-actions @ bbdd199 (main as of 2026-06-08)
env:
  CI_ACTIONS_REF: bbdd199c8796cdec6f064827eedc45028cd60ce3
  NDK_VERSION: r27b
  EMSDK_VERSION: 4.0.23

jobs:
  build:
    name: ${{ matrix.label }}-${{ matrix.kind }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: setup build tools
        uses: tanh-lab/ci-actions/setup-cpp-build-tools@bbdd199c8796cdec6f064827eedc45028cd60ce3

      # ci-actions only installs deps for the `Linux-x86_64` name; ensure ninja
      # exists on the arm64 / android / wasm ubuntu rows too.
      - name: ensure ninja (Linux fallback)
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: command -v ninja >/dev/null || { sudo apt-get update && sudo apt-get install -y ninja-build; }

      - name: setup Android NDK
        if: ${{ matrix.toolchain == 'android' }}
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}

      - name: setup emsdk (wasm)
        if: ${{ matrix.toolchain == 'wasm' }}
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}
          actions-cache-folder: emsdk-cache-${{ env.EMSDK_VERSION }}

      # Load the MSVC dev environment so cl.exe/lib.exe are on PATH (Ninja build +
      # static bundling). matrix.msvc_arch is x64 or arm64 (both native).
      - name: setup MSVC env (Windows)
        if: ${{ runner.os == 'Windows' }}
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      # ----------------------------------------------------------------------
      # Configure + build the preset. Presets/CMakeLists live in <backend>/, so
      # we run from there (ci-actions cmake-build assumes presets at repo root).
      # sccache mirrors what cmake-build does; skipped for the emscripten target.
      # ----------------------------------------------------------------------
      - name: sccache
        uses: mozilla-actions/sccache-action@v0.0.8

      - name: launcher flags
        id: cfg
        shell: bash
        run: |
          if [ "${{ matrix.toolchain }}" = "wasm" ]; then
            echo "launchers=" >> "$GITHUB_OUTPUT"
          else
            echo "launchers=-DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache" >> "$GITHUB_OUTPUT"
          fi

      - name: configure
        working-directory: ${{ inputs.backend_dir }}
        shell: bash
        run: cmake --preset ${{ matrix.preset }} ${{ steps.cfg.outputs.launchers }}

      - name: build
        working-directory: ${{ inputs.backend_dir }}
        shell: bash
        run: cmake --build --preset ${{ matrix.preset }} -j

      # ----------------------------------------------------------------------
      # Compose the anira archive name and install into a staging prefix.
      # ----------------------------------------------------------------------
      - name: compose archive name
        id: name
        shell: bash
        run: |
          base="${{ inputs.libname }}-${{ inputs.version }}"
          if [ "${{ matrix.toolchain }}" = "wasm" ]; then
            # wasm is ABI-tied to the toolchain → key by emsdk version
            name="${base}-wasm-emsdk-${EMSDK_VERSION}"
          else
            name="${base}-${{ matrix.os }}-${{ matrix.arch }}"
            [ "${{ matrix.kind }}" = "static" ] && name="${name}-static"
          fi
          echo "archive=$name" >> "$GITHUB_OUTPUT"

      - name: install
        shell: bash
        run: |
          cmake --install "${{ inputs.backend_dir }}/build/${{ matrix.preset }}" \
            --config Release \
            --prefix "staging/${{ steps.name.outputs.archive }}"

      # Static builds: the installed libtensorflowlite_c.a holds only C-API
      # objects. Merge in all transitive dependency archives so the shipped lib
      # is a single, self-contained, drop-in archive.
      - name: bundle static deps
        if: ${{ matrix.kind == 'static' }}
        shell: bash
        run: |
          libdir="staging/${{ steps.name.outputs.archive }}/lib"
          if [ "${{ runner.os }}" = "Windows" ]; then
            out="$libdir/tensorflowlite_c.lib"
          else
            out="$libdir/libtensorflowlite_c.a"
          fi
          bash shared/bundle-static.sh "${{ inputs.backend_dir }}/build/${{ matrix.preset }}" "$out"

      # NOTE: macOS codesigning is intentionally OFF this round (shared/sign-macos.sh
      # stays in the repo for when Developer ID signing is enabled later).

      - name: package
        shell: bash
        run: bash shared/package.sh "staging/${{ steps.name.outputs.archive }}" "${{ steps.name.outputs.archive }}" dist

      - name: upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.name.outputs.archive }}
          path: dist/${{ steps.name.outputs.archive }}.zip
          retention-days: 14

      # Hard gate: compile + link the example against the PACKAGED artifact (the
      # static link proves the bundled .a is complete) and run a forward pass on
      # native targets. Runs after upload (so the artifact is kept for debugging)
      # but before publish, so a broken artifact never reaches a release.
      # TFLite-specific model path; parameterize when other backends are added.
      - name: smoke test
        if: ${{ matrix.toolchain == 'none' }}
        shell: bash
        run: |
          bash shared/smoke-test.sh \
            "staging/${{ steps.name.outputs.archive }}" \
            "${{ inputs.backend_dir }}/test/smoke.cpp" \
            "${{ inputs.backend_dir }}/build/${{ matrix.preset }}/_deps/tensorflow-src/tensorflow/lite/testdata/add.bin" \
            "${{ matrix.kind }}" "${{ matrix.arch }}" "${{ matrix.can_run }}"

      # Per-ABI Android builds are intermediate — combined into one multi-ABI
      # bundle below — so they don't publish standalone.
      - name: publish to release
        if: ${{ inputs.release && matrix.os != 'Android' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ inputs.backend }}-v${{ inputs.version }}"
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" --title "$tag" --notes "Automated ${{ inputs.backend }} ${{ inputs.version }} build"
          gh release upload "$tag" "dist/${{ steps.name.outputs.archive }}.zip" --clobber

  # --------------------------------------------------------------------------
  # macOS universal: lipo the x86_64 + arm64 slices into one fat archive.
  # Runs after the build matrix; consumes the two macOS artifacts per kind.
  # --------------------------------------------------------------------------
  macos-universal:
    name: macOS-universal-${{ matrix.kind }}
    needs: build
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        kind: [shared, static]
    steps:
      - uses: actions/checkout@v6

      - name: compose names
        id: n
        shell: bash
        run: |
          base="${{ inputs.libname }}-${{ inputs.version }}"
          sfx=""; [ "${{ matrix.kind }}" = "static" ] && sfx="-static"
          {
            echo "x64=${base}-macOS-x86_64${sfx}"
            echo "arm=${base}-macOS-arm64${sfx}"
            echo "uni=${base}-macOS-universal${sfx}"
            if [ "${{ matrix.kind }}" = "static" ]; then echo "lib=libtensorflowlite_c.a"; else echo "lib=libtensorflowlite_c.dylib"; fi
          } >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v8
        with: { name: "${{ steps.n.outputs.x64 }}", path: dl/x64 }
      - uses: actions/download-artifact@v8
        with: { name: "${{ steps.n.outputs.arm }}", path: dl/arm }

      - name: lipo + repackage
        shell: bash
        run: |
          set -euo pipefail
          unzip -q "dl/x64/${{ steps.n.outputs.x64 }}.zip" -d ex/x64
          unzip -q "dl/arm/${{ steps.n.outputs.arm }}.zip" -d ex/arm

          stage="staging/${{ steps.n.outputs.uni }}"
          mkdir -p "$stage/lib"
          # headers are arch-independent — take one copy
          cp -R ex/x64/include "$stage/include"
          lipo -create \
            "ex/x64/lib/${{ steps.n.outputs.lib }}" \
            "ex/arm/lib/${{ steps.n.outputs.lib }}" \
            -output "$stage/lib/${{ steps.n.outputs.lib }}"
          lipo -info "$stage/lib/${{ steps.n.outputs.lib }}"

          bash shared/package.sh "$stage" "${{ steps.n.outputs.uni }}" dist

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.n.outputs.uni }}
          path: dist/${{ steps.n.outputs.uni }}.zip
          retention-days: 14

      - name: publish to release
        if: ${{ inputs.release }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ inputs.backend }}-v${{ inputs.version }}"
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" --title "$tag" --notes "Automated ${{ inputs.backend }} ${{ inputs.version }} build"
          gh release upload "$tag" "dist/${{ steps.n.outputs.uni }}.zip" --clobber

  # --------------------------------------------------------------------------
  # Android: combine the per-ABI static libs into ONE multi-ABI archive with
  # lib/<abi>/ — the layout Android/NDK tooling expects (like an AAR's jni/<abi>/).
  # The per-ABI build jobs are intermediate; only this combined archive ships.
  # --------------------------------------------------------------------------
  android-bundle:
    name: Android-bundle
    needs: build
    if: ${{ contains(inputs.matrix, 'android') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: compose names
        id: n
        shell: bash
        run: |
          base="${{ inputs.libname }}-${{ inputs.version }}"
          {
            echo "arm=${base}-Android-arm64-v8a-static"
            echo "x64=${base}-Android-x86_64-static"
            echo "bundle=${base}-Android-static"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v8
        with: { name: "${{ steps.n.outputs.arm }}", path: dl/arm }
      - uses: actions/download-artifact@v8
        with: { name: "${{ steps.n.outputs.x64 }}", path: dl/x64 }

      - name: assemble multi-ABI bundle
        shell: bash
        run: |
          set -euo pipefail
          unzip -q "dl/arm/${{ steps.n.outputs.arm }}.zip" -d ex/arm
          unzip -q "dl/x64/${{ steps.n.outputs.x64 }}.zip" -d ex/x64
          stage="staging/${{ steps.n.outputs.bundle }}"
          mkdir -p "$stage/lib/arm64-v8a" "$stage/lib/x86_64"
          cp -R ex/arm/include "$stage/include"   # headers are ABI-independent
          cp ex/arm/lib/libtensorflowlite_c.a "$stage/lib/arm64-v8a/"
          cp ex/x64/lib/libtensorflowlite_c.a "$stage/lib/x86_64/"
          bash shared/package.sh "$stage" "${{ steps.n.outputs.bundle }}" dist

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.n.outputs.bundle }}
          path: dist/${{ steps.n.outputs.bundle }}.zip
          retention-days: 14

      - name: publish to release
        if: ${{ inputs.release }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ inputs.backend }}-v${{ inputs.version }}"
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" --title "$tag" --notes "Automated ${{ inputs.backend }} ${{ inputs.version }} build"
          gh release upload "$tag" "dist/${{ steps.n.outputs.bundle }}.zip" --clobber

  # --------------------------------------------------------------------------
  # iOS: repackage Google's official prebuilt TensorFlowLiteC.xcframework (CPU,
  # static, device + simulator). No build — the per-version download URL is read
  # from the CocoaPods podspec. Independent of the build matrix.
  # --------------------------------------------------------------------------
  ios-xcframework:
    name: iOS-xcframework
    if: ${{ inputs.backend == 'litert' }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: download prebuilt xcframework
        id: dl
        shell: bash
        run: |
          set -euo pipefail
          VER="${{ inputs.version }}"
          # CocoaPods Specs shard for "TensorFlowLiteC" = 1/6/0
          spec="https://raw.githubusercontent.com/CocoaPods/Specs/master/Specs/1/6/0/TensorFlowLiteC/${VER}/TensorFlowLiteC.podspec.json"
          url="$(curl -fsSL "$spec" | python3 -c 'import json,sys; print(json.load(sys.stdin)["source"]["http"])')"
          echo "framework url: $url"
          curl -fsSL "$url" -o tflc.tar.gz
          mkdir -p ex && tar -xzf tflc.tar.gz -C ex
          # base CPU framework only (not TensorFlowLiteCMetal/CoreML)
          xcf="$(find ex -maxdepth 4 -type d -name 'TensorFlowLiteC.xcframework' | head -1)"
          [ -n "$xcf" ] || { echo "::error::TensorFlowLiteC.xcframework not found"; exit 1; }
          echo "xcf=$xcf" >> "$GITHUB_OUTPUT"

      - name: validate slices
        shell: bash
        run: |
          set -euo pipefail
          xcf="${{ steps.dl.outputs.xcf }}"
          echo "slices:"; ls "$xcf"
          ls "$xcf" | grep -q 'ios-arm64'   || { echo "::error::no device (ios-arm64) slice"; exit 1; }
          ls "$xcf" | grep -qi 'simulator'  || { echo "::error::no simulator slice"; exit 1; }
          # symbol usability is verified by the compile+link smoke step below.

      # Real smoke gate: compile + link smoke.cpp against the simulator slice
      # (the framework header resolves via __has_include). A simulator forward-pass
      # run needs a test .app bundle + booted sim — deferred.
      - name: smoke test (compile + link, iphonesimulator)
        shell: bash
        run: |
          set -euo pipefail
          xcf="${{ steps.dl.outputs.xcf }}"
          fw_dir="$(find "$xcf" -maxdepth 1 -type d -name '*simulator*' | head -1)"
          sdk="$(xcrun --sdk iphonesimulator --show-sdk-path)"
          clang++ -std=c++17 -arch arm64 -isysroot "$sdk" -mios-simulator-version-min=12.0 \
            -F "$fw_dir" -framework TensorFlowLiteC -framework Foundation \
            "${{ inputs.backend_dir }}/test/smoke.cpp" -o /tmp/smoke_ios
          file /tmp/smoke_ios && echo "iOS smoke: compile+link OK"

      - name: repackage
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          archive="${{ inputs.libname }}-${{ inputs.version }}-iOS-xcframework"
          mkdir -p dist "staging/$archive"
          cp -R "${{ steps.dl.outputs.xcf }}" "staging/$archive/"
          ( cd "staging/$archive" && cmake -E tar cf "$GITHUB_WORKSPACE/dist/$archive.zip" --format=zip TensorFlowLiteC.xcframework )
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.pack.outputs.archive }}
          path: dist/${{ steps.pack.outputs.archive }}.zip
          retention-days: 14

      - name: publish to release
        if: ${{ inputs.release }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ inputs.backend }}-v${{ inputs.version }}"
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" --title "$tag" --notes "Automated ${{ inputs.backend }} ${{ inputs.version }} build"
          gh release upload "$tag" "dist/${{ steps.pack.outputs.archive }}.zip" --clobber
