name: stage-build
description: >
  Build (or repackage) one leg via the root CMake orchestrator and produce a staging tree.
  Uniform for every engine: `cmake --preset` -> `cmake --build` -> `cmake --install` into
  staging/<archive>. tflite is a native CMake build (static legs then get their component
  archives merged in); onnx/libtorch run their own build/repackage via the orchestrator's
  stage.sh. Composes the canonical archive name and, for prebuilt legs, the upstream URL.

inputs:
  preset:       { description: "Root CMake preset to build", required: true }
  name:         { description: "Canonical platform-arch token, e.g. macOS-arm64", required: true }
  kind:         { description: "shared | static", required: true }
  config:       { description: "Release | Debug", required: true }
  engine:       { description: "Backend id: tflite | onnxruntime | libtorch", required: true }
  libname:      { description: "Archive/lib prefix, e.g. tensorflowlite_c | onnxruntime | libtorch", required: true }
  version:      { description: "Upstream version (archive name + URL)", required: true }
  source:       { description: "build | prebuilt", required: false, default: build }
  asset:        { description: "prebuilt upstream asset stem", required: false, default: "" }
  ext:          { description: "prebuilt archive extension (tgz|zip)", required: false, default: "" }
  cpu_suffix:   { description: "libtorch prebuilt cpu suffix, e.g. %2Bcpu", required: false, default: "" }
  flavor:       { description: "onnx prebuilt flavor: linux|windows|android-aar", required: false, default: "" }

outputs:
  archive:
    description: "Archive basename (no extension)"
    value: ${{ steps.n.outputs.archive }}
  staging:
    description: "Path to the staged install prefix"
    value: ${{ steps.n.outputs.staging }}

runs:
  using: composite
  steps:
    - id: n
      shell: bash
      run: |
        set -euo pipefail
        archive="${{ inputs.libname }}-${{ inputs.version }}-${{ inputs.name }}-${{ inputs.kind }}"
        [ "${{ inputs.config }}" = "Debug" ] && archive="${archive}-debug"
        echo "archive=$archive" >> "$GITHUB_OUTPUT"
        echo "staging=staging/$archive" >> "$GITHUB_OUTPUT"

    - id: url
      if: ${{ inputs.source == 'prebuilt' }}
      shell: bash
      run: |
        set -euo pipefail
        ver="${{ inputs.version }}"
        case "${{ inputs.engine }}" in
          onnxruntime)
            case "${{ inputs.flavor }}" in
              android-aar) url="https://repo1.maven.org/maven2/com/microsoft/onnxruntime/onnxruntime-android/${ver}/onnxruntime-android-${ver}.aar" ;;
              *)           url="https://github.com/microsoft/onnxruntime/releases/download/v${ver}/${{ inputs.asset }}-${ver}.${{ inputs.ext }}" ;;
            esac ;;
          libtorch)
            url="https://download.pytorch.org/libtorch/cpu/${{ inputs.asset }}-${ver}${{ inputs.cpu_suffix }}.zip" ;;
          litert)
            url="" ;;   # litert fetches its prebuilt libLiteRt internally (Git-LFS media endpoint)
          *) echo "::error::no prebuilt URL template for engine ${{ inputs.engine }}"; exit 1 ;;
        esac
        echo "url=$url" >> "$GITHUB_OUTPUT"
        echo "prebuilt url: $url"

    - uses: mozilla-actions/sccache-action@v0.0.8

    - id: cfg
      shell: bash
      run: |
        # sccache compiler-launcher applies only to tflite (the native CMake build). onnx/libtorch
        # build via their own systems under a NONE orchestrator project, so the launcher would be
        # an unused-variable warning. Also skip for MSVC Debug: /Z7 emits no .pdb but CMake still
        # passes /Fd, so sccache errors caching a pdb that doesn't exist.
        if [ "${{ inputs.engine }}" = "tflite" ] && [ "${{ inputs.config }}" != "Debug" ]; then
          echo "launchers=-DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache" >> "$GITHUB_OUTPUT"
        else
          echo "launchers=" >> "$GITHUB_OUTPUT"
        fi

    - name: configure
      shell: bash
      run: |
        cmake --preset ${{ inputs.preset }} ${{ steps.cfg.outputs.launchers }} \
          ${{ inputs.source == 'prebuilt' && format('-DBACKENDS_URL={0}', steps.url.outputs.url) || '' }}

    - name: build
      shell: bash
      run: cmake --build build/${{ inputs.preset }} -j

    - name: install
      shell: bash
      run: cmake --install build/${{ inputs.preset }} --config ${{ inputs.config }} --prefix "${{ steps.n.outputs.staging }}"

    # tflite static: the installed C-API archive holds only C-API objects — merge in all
    # transitive dependency archives so the shipped lib is a single self-contained drop-in.
    # (onnx/libtorch do their own bundling/repackaging inside the orchestrator's stage.sh.)
    - name: bundle static deps (tflite)
      if: ${{ inputs.engine == 'tflite' && inputs.kind == 'static' }}
      shell: bash
      run: |
        set -euo pipefail
        if [ "${{ runner.os }}" = "Windows" ]; then out="${{ steps.n.outputs.staging }}/lib/${{ inputs.libname }}.lib"
        else out="${{ steps.n.outputs.staging }}/lib/lib${{ inputs.libname }}.a"; fi
        bash scripts/bundle-static.sh "build/${{ inputs.preset }}" "$out"
