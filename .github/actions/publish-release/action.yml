name: publish-release
description: >
  Upsert a GitHub release for the given tag and upload one archive to it. Idempotent:
  creates the release if missing, then uploads with --clobber. Replaces the gh release
  view||create + upload block that every job used to duplicate.

inputs:
  tag:
    description: "Release tag (the anira version, e.g. v2.0.3)"
    required: true
  file:
    description: "Path to the .zip artifact to upload"
    required: true
  token:
    description: "GitHub token with contents:write"
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        tag="${{ inputs.tag }}"
        gh release view "$tag" >/dev/null 2>&1 || \
          gh release create "$tag" --title "$tag" --notes "anira backends $tag"
        gh release upload "$tag" "${{ inputs.file }}" --clobber
